<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Tailwind CSS basics</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<!-- 50, 100,....900 -->
<body class="bg-yellow-200"> 
    <p class="text-red-500">Hello Tailwind CSS</p>
    <h2 class="text-blue p-4 m-4">Utility Class 1</h2> 
    <h3 class="text-blue pr-6 mt-4">Utility Class 2</h3> 
    <h4 class="text-yellow px-6 py-6 mt-4 bg-red-100">Utility Class 3</h4>    
    <div class="border-8 bg-red-100 border-red-500 rounded-r-full/sm/lg">Box</div>
    <p class="text-lg">My text 1</p><!-- sm/base/lg/xl/2xl/3xl -->
    <p class="text-light">My text 2</p><!-- left/normal/bold -->
    <p class="text-center">My text 3</p><!-- left/center/right -->
    <button class="bg-blue-500  hover:bg-balck-500 hover:text-white font-bold px-2 rounded-r-full rounded-l-full m-4">click</button>
    <!-- success:green, error:red, warning-->
     <div class="bg-green-200 p-4">
    <p class="font-bold"> Success Message</p>
    <p>This is success Message</p>
    <p>This is success Message</p>
    </div>
    <span class="inline-flex items-center bg-blue-100 text-blue-800 px-3 py-1 rounded-full m-1">New</span>

    <div class="border p-6 rounded m-8">
        <h3 class="font-bold text-xl">Card Title</h3>
        <p> This is a simple description inside the card </p>
    </div>
</body>
</html>

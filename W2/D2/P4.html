<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Notification Center</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </style>
</head>
<body class="bg-green-100">
  <div class="bg-white p-2 rounded-2xl m-8">
    <div class=" flex items-center m-3">
      <h2 class="text-xl font-bold">
        Notification Center
      </h2>
      <div class="items-center bg-blue-100 text-black-200 px-2 py-1  hover:bg-yellow-200 rounded-xl ml-100">
        3 New
      </div>
    </div>
    <div class="m-4 space-y-2">
      <div class="bg-red-200 border-red-500 p-4 rounded-md">
        <h3 class="font-bold">Action Required</h3>
        <p>
          Your last payment attempt failed. Please update your payment method to avoid service interruption.
        </p>
      </div>
      <div class="bg-blue-200  border-blue-500 p-4 rounded-md">
        <h3 class="font-bold">Maintenance Notice</h3>
        <p>
          The system will undergo maintanance tonight. Some features may be temporarily unavailable.
        </p>
      </div>
      <div class="space-x-4 m-4">
      <button class=" border bg-green-500 hover:bg-blue-600 text-white px-5 py-2 ">
        View All
      </button>
      <button class="border border-gray-400 px-4 py-2 rounded">Dismiss</button>
    </div>
    </div>
  </div>
</body>
</html>

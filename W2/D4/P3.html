<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Centering</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50">
        <main class="max-w-4xl mx-auto p-6 space-y-8">
        <div class=" bg-purple-200 fixed inset-0 z-50 flex items-center justify-center">
            <div class=" bg-yellow-300 w-[min(520px,92vw)] border rounded p-6 shadow-lg">
                <h2>My Modal</h2>
                <p class="mt-2 flex-sm">My first modal is here</p>
                <div class="flex justify-end gap-3 mt-6">
                    <button class="px-4 py-2 rounded border hover:bg-red-500 transition">Cancel</button>
                    <button class="px-4 py-2 rounded border hover:bg-green-500 transition">Confirm</button>
                </div>
            </div>
        </div>
        </main>
</body>
</html>
